name: Destroy Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write
  pages: write
  id-token: write

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Destroy GitHub Pages deployment
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const deployments = await github.rest.repos.listDeployments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                environment: 'github-pages'
              });
              
              for (const deployment of deployments.data) {
                console.log(`Deleting deployment #${deployment.id}`);
                await github.rest.repos.createDeploymentStatus({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: deployment.id,
                  state: 'inactive'
                });
              }
              
              console.log('GitHub Pages deployment destroyed successfully');
            } catch (error) {
              console.log('Deployment not found or already destroyed:', error.message);
            }

      - name: Disable GitHub Pages
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pages: {
                  build_type: 'legacy',
                  source: {
                    branch: 'main',
                    path: '/'
                  }
                }
              });
            } catch (error) {
              console.log('Could not update pages settings:', error.message);
            }
